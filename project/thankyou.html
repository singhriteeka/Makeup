<!DOCTYPE html>
<html>
<head>
    <title>Thank You</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2b3a55;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0px 6px 18px rgba(0,0,0,0.1);
        }

        h1 {
            color: #0b63b8;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 16px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #0b63b8;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        
    </style>
</head>
<body>

    <div class="box">
        <h1>Thank You!</h1>
        <p>Your response has been submitted successfully.</p>
        <p>We appreciate your time and effort.</p>

       
    </div>

</body>
</html>
